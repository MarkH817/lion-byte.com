{% extends "layouts/base.html" %}

{% block stylesheets %}
<style>{% include "../../../node_modules/prism-themes/themes/prism-a11y-dark.css" %}</style>
<style>
  .post {
    font-size: var(--font-size-5);
    /* screen-lg */
    @media screen and (min-width: 60rem) {
      max-width: 45ch;
    }
  }

  .post__header {
    margin-bottom: var(--space-size-6);
  }

  .post__content {
    line-height: 1.5;

    p {
      img {
        max-width: 100%;
      }
    }

    a {
      display: inline-block;
      @media (prefers-reduced-motion: no-preference) {
        transition: transform 50ms ease-in-out;
      }

      &:focus,
      &:hover {
        transform: scale(1.05);
      }

      &:active {
        transform: scale(1.02);
      }
    }

    & > pre[class*="language-"] {
      font-size: var(--font-size-3);
      margin: var(--space-size-5) calc(-1 * var(--space-size-5));
      padding-inline: var(--space-size-5);
    }
  }
</style>
{% endblock %}

{% block content %}
<article class="post">
  <header class="post__header">
    <time class="post__date" datetime="{{ date | isoDateFilter }}">
      {{ date | dateFilter }}
    </time>
  </header>

  <div class="post__content">{{ content | safe }}</div>
</article>
{% endblock %}
